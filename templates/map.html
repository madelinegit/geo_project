{% extends "base.html" %}
{% block content %}

<div class="flex h-[calc(100vh-72px)]">

  <!-- SIDEBAR -->
  <div class="w-96 bg-white shadow-xl p-6 overflow-y-auto">

    <h2 class="text-xl font-bold mb-4">Tahoe Dispatch</h2>

    <!-- START LOCATION -->
    <div class="mb-4 p-3 bg-gray-100 rounded-lg">
      <div class="text-sm text-gray-500 mb-2">Starting Point</div>

      <select id="startMode" class="w-full border rounded-lg p-2 mb-2">
        <option value="office" selected>Tahoe Getaways Office</option>
        <option value="property">Choose Property</option>
      </select>

      <select id="startProperty"
              class="w-full border rounded-lg p-2 hidden"></select>
    </div>

    <!-- START TIME -->
    <div class="mb-4">
      <label class="text-sm text-gray-600">Start Time</label>
      <input type="time"
             id="startTime"
             value="09:00"
             class="w-full border rounded-lg p-2">
      <div class="text-xs text-gray-500 mt-1">
        Check-ins must arrive by 4:00 PM
      </div>
    </div>

    <!-- SEARCH -->
    <input id="searchBox"
           placeholder="Add property..."
           class="w-full border rounded-lg p-2 mb-2">

    <div id="suggestions"
         class="bg-white border rounded-lg mb-4 max-h-48 overflow-y-auto"></div>

    <h4 class="font-semibold mb-2">Selected Stops</h4>
    <div id="selectedStops" class="space-y-3 mb-4"></div>

    <button onclick="optimizeRoute()"
            class="bg-indigo-600 text-white px-4 py-2 rounded-lg w-full mb-2">
      Optimize Route
    </button>

    <button onclick="exportToGoogleMaps()"
            class="bg-green-600 text-white px-4 py-2 rounded-lg w-full">
      Open in Google Maps
    </button>

    <!-- WARNINGS -->
    <div id="warningBox" class="mt-4 text-sm hidden p-2 rounded"></div>

    <!-- ROUTE OUTPUT -->
    <div class="mt-6">
      <h3 class="font-semibold mb-2">Route Schedule</h3>
      <ol id="routeList" class="space-y-2"></ol>

      <div class="mt-4 text-sm">
        <div><b>Total:</b> <span id="totalTime">—</span></div>
        <div><b>Driving:</b> <span id="drivingTime">—</span></div>
        <div><b>At Houses:</b> <span id="serviceTime">—</span></div>
        <div><b>Distance:</b> <span id="distance">—</span></div>
      </div>
    </div>

  </div>

  <!-- MAP -->
  <div id="map" class="flex-1"></div>
</div>

<script>

/* ================= MAP ================= */

var map = L.map('map').setView([39.3279, -120.1833], 11);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:18}).addTo(map);

let routeLayer = null;
let activeRouteMarkers = [];
let markers = {};
const properties = {{ properties|tojson }};
let selectedStops = [];

/* ================= ICONS ================= */

let regularIcon = new L.Icon({
  iconUrl: "https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-blue.png",
  shadowUrl: "https://unpkg.com/leaflet@1.7.1/dist/images/marker-shadow.png",
  iconSize: [25,41],
  iconAnchor: [12,41]
});

let checkinIcon = new L.Icon({
  iconUrl: "https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-green.png",
  shadowUrl: "https://unpkg.com/leaflet@1.7.1/dist/images/marker-shadow.png",
  iconSize: [25,41],
  iconAnchor: [12,41]
});

let nearDeadlineIcon = new L.Icon({
  iconUrl: "https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png",
  shadowUrl: "https://unpkg.com/leaflet@1.7.1/dist/images/marker-shadow.png",
  iconSize: [25,41],
  iconAnchor: [12,41]
});

/* ================= START LOCATION ================= */

let startLocation = {
  name: "Tahoe Getaways Office",
  lat: 39.3279,
  lng: -120.1833
};

const startMode = document.getElementById("startMode");
const startProperty = document.getElementById("startProperty");

properties.forEach(p => {
  if(p.lat && p.lng){
    let option = document.createElement("option");
    option.value = p.name;
    option.textContent = p.name;
    startProperty.appendChild(option);
  }
});

// initialize start location from UI
//if(startMode.value === "office"){
  //startLocation = {
    //name: "Tahoe Getaways Office",
    //lat: 39.3279,
    //lng: -120.1833
  //};
//}

startMode.addEventListener("change", function(){
  startProperty.classList.toggle("hidden", this.value !== "property");

  if(this.value === "office"){
    startLocation = {
      name: "Tahoe Getaways Office",
      lat: 39.3279,
      lng: -120.1833
    };
  }
});

startProperty.addEventListener("change", function(){
  let selected = properties.find(p => p.name === this.value);
  if(selected){
    startLocation = {
      name: selected.name,
      lat: selected.lat,
      lng: selected.lng
    };
  }
});

/* ================= SEARCH ================= */

const searchBox = document.getElementById("searchBox");
const suggestions = document.getElementById("suggestions");

let currentSuggestions = [];
let activeIndex = -1;

searchBox.addEventListener("input", function(){

  const text = this.value.toLowerCase().trim();
  suggestions.innerHTML = "";
  currentSuggestions = [];
  activeIndex = -1;

  if(text.length < 2) return;

  currentSuggestions = properties
    .filter(p => p.name && p.name.toLowerCase().includes(text))
    .slice(0,10);

  renderSuggestions();
});

searchBox.addEventListener("keydown", function(e){

  if(currentSuggestions.length === 0) return;

  if(e.key === "ArrowDown"){
    e.preventDefault();
    activeIndex = (activeIndex + 1) % currentSuggestions.length;
    updateHighlight();
  }

  else if(e.key === "ArrowUp"){
    e.preventDefault();
    activeIndex = (activeIndex - 1 + currentSuggestions.length) % currentSuggestions.length;
    updateHighlight();
  }

  else if(e.key === "Enter"){
    e.preventDefault();
    if(activeIndex >= 0){
      addStop(currentSuggestions[activeIndex]);
      closeSuggestions();
    }
  }

  else if(e.key === "Escape"){
    closeSuggestions();
  }
});

function renderSuggestions(){
  suggestions.innerHTML = "";

  currentSuggestions.forEach((p, index) => {

    const div = document.createElement("div");
    div.className = "p-2 cursor-pointer border-b hover:bg-indigo-100";
    div.innerText = p.name;

    div.addEventListener("mouseenter", function(){
      activeIndex = index;
      updateHighlight();
    });

    div.addEventListener("click", function(){
      addStop(p);
      closeSuggestions();
    });

    suggestions.appendChild(div);
  });
}

function updateHighlight(){

  const items = suggestions.children;

  for(let i = 0; i < items.length; i++){
    items[i].classList.remove("bg-indigo-200");
  }

  if(activeIndex >= 0 && items[activeIndex]){
    items[activeIndex].classList.add("bg-indigo-200");
  }
}

function closeSuggestions(){
  suggestions.innerHTML = "";
  searchBox.value = "";
  currentSuggestions = [];
  activeIndex = -1;
}

/* ================= STOPS ================= */

function addStop(property){
  if(property.name === startLocation.name) return;
  if(selectedStops.find(s => s.name === property.name)) return;

  selectedStops.push({
    name: property.name,
    lat: property.lat,
    lng: property.lng,
    arrival: false,
    serviceMinutes: 60
  });

  renderStops();
}

function renderStops(){
  const container = document.getElementById("selectedStops");
  container.innerHTML = "";

  selectedStops.forEach((s,i)=>{
    let div = document.createElement("div");
    div.className = "bg-gray-50 p-2 rounded shadow-sm";

    div.innerHTML = `
      <div class="font-medium">${s.name}</div>
      <label>
        <input type="checkbox"
               onchange="selectedStops[${i}].arrival = this.checked"
               ${s.arrival ? "checked" : ""}>
        Check-in
      </label>
      <div class="mt-1">
        Service Time:
        <select onchange="selectedStops[${i}].serviceMinutes = parseInt(this.value)">
          ${generateTimeOptions(s.serviceMinutes)}
        </select>
      </div>
      <button onclick="selectedStops.splice(${i},1); renderStops();"
              class="text-red-500 text-sm mt-1">
        Remove
      </button>
    `;

    container.appendChild(div);
  });
}

function generateTimeOptions(selected){
  let html = "";
  for(let m = 15; m <= 240; m += 15){
    html += `<option value="${m}" ${m==selected?"selected":""}>${m} min</option>`;
  }
  return html;
}

/* ================= ROUTE ================= */

function clearRouteMarkers(){
  activeRouteMarkers.forEach(m => map.removeLayer(m));
  activeRouteMarkers = [];
}

function optimizeRoute(){

  fetch("/optimize", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      stops: selectedStops,
      start: startLocation,
      startTime: document.getElementById("startTime").value
    })
  })
  .then(res => res.json())
  .then(data => {

    if(data.error){
      alert(data.error);
      return;
    }

    clearRouteMarkers();
    if(routeLayer) map.removeLayer(routeLayer);

    routeLayer = L.geoJSON(data.geometry,{
      style:{color:"#6366f1",weight:5}
    }).addTo(map);

      // draw start marker
      let startMarker = L.marker([startLocation.lat, startLocation.lng], {
        icon: regularIcon
      }).addTo(map)
        .bindPopup("<b>Start</b><br>" + startLocation.name);

      activeRouteMarkers.push(startMarker);

    document.getElementById("totalTime").innerText =
      (data.total_duration/3600).toFixed(2)+" hrs";

    document.getElementById("drivingTime").innerText =
      (data.driving_duration/3600).toFixed(2)+" hrs";

    document.getElementById("serviceTime").innerText =
      (data.service_duration/3600).toFixed(2)+" hrs";

    document.getElementById("distance").innerText =
      (data.distance/1609).toFixed(1)+" miles";

    const list = document.getElementById("routeList");
    list.innerHTML = "";

    let warningBox = document.getElementById("warningBox");
    warningBox.className = "mt-4 text-sm hidden p-2 rounded";
    warningBox.innerHTML = "";

    if(data.total_duration > 10 * 3600){
      warningBox.classList.remove("hidden");
      warningBox.classList.add("shift-warning");
      warningBox.innerHTML = "⚠ Route exceeds 10-hour shift.";
    }

    // OPTIONAL: if your backend includes late_checkins list, show a warning
    if(data.late_checkins && data.late_checkins.length > 0){
      warningBox.classList.remove("hidden");
      warningBox.classList.add("deadline-warning");
      warningBox.innerHTML = `⚠ Late check-ins: ${data.late_checkins.join(", ")}`;
    }

    data.schedule.forEach((stop,index)=>{

      let departureMinutes = stop.eta_minutes + stop.serviceMinutes;
      let departureHH = Math.floor(departureMinutes/60)%24;
      let departureMM = departureMinutes%60;
      let departure =
        String(departureHH).padStart(2,'0') + ":" +
        String(departureMM).padStart(2,'0');

      const li = document.createElement("li");
      li.className = "p-2 border rounded cursor-pointer";

      // ✅ BADGE FIX: use stop.late
      let badge = "";
      if(stop.arrival && stop.late){
        badge = `<span class="late-badge">LATE</span>`;
      } else if(stop.arrival){
        badge = `<span class="checkin-badge">CHECK-IN</span>`;
      }

      li.innerHTML = `
        <div class="font-medium flex items-center">
          ${index+1}. ${stop.name} ${badge}
        </div>
        <div class="text-xs text-gray-600">
          Arrive: ${stop.eta} | Depart: ${departure}
        </div>
      `;

      list.appendChild(li);

      // ✅ ICON FIX: use stop.late
      let iconToUse = regularIcon;
      if(stop.arrival && stop.late){
        iconToUse = nearDeadlineIcon; // red
      } else if(stop.arrival){
        iconToUse = checkinIcon;      // green
      }

      let marker = L.marker([stop.lat, stop.lng], {icon: iconToUse})
        .addTo(map)
        .bindPopup(`<b>${stop.name}</b><br>
                    Arrive: ${stop.eta}<br>
                    Depart: ${departure}<br>
                    ${stop.arrival ? (stop.late ? "<span style='color:#dc2626;font-weight:700;'>LATE CHECK-IN</span>" : "<span style='color:#16a34a;font-weight:700;'>CHECK-IN</span>") : ""}`);

      marker.bindTooltip(`${index+1}`,{
        permanent:true,
        direction:"top",
        className:"route-number"
      });

      activeRouteMarkers.push(marker);
      markers[stop.name] = marker;

      li.addEventListener("mouseenter", function(){
        marker.openPopup();
        map.panTo(marker.getLatLng());
      });

      li.addEventListener("mouseleave", function(){
        marker.closePopup();
      });

    });

  });
}

function exportToGoogleMaps(){
  alert("Optimize route first.");
}

</script>

{% endblock %}
